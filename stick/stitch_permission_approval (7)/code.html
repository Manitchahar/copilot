<div class="bg-white/50 p-2 rounded-full text-primary">
<span class="material-symbols-outlined">mail</span>
</div>
<span class="font-label text-sm font-medium text-on-surface-variant group-hover:text-primary transition-colors">Send a message</span>

<span class="material-symbols-outlined">edit_note</span>
